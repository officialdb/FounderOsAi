services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: founderos_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DEBUG: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/founderos_ai
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      JWT_SECRET_KEY: replace-with-a-long-secure-secret-at-least-32-chars
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRY_MINUTES: 60
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      SENTRY_DSN: ""
      POSTHOG_API_KEY: ""
      POSTHOG_HOST: https://us.i.posthog.com
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_APP_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
